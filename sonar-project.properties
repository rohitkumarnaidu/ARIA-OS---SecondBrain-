sonar.projectKey=app
sonar.projectName=app
sonar.projectVersion=1.0.0
sonar.sources=apps/api,apps/web,packages,services
sonar.tests=tests,apps/web/__tests__
sonar.exclusions=node_modules/**,dist/**,.next/**,venv/**,**/__pycache__/**,*.min.js,build/**
sonar.test.exclusions=node_modules/**,venv/**
sonar.python.coverage.reportPaths=coverage.xml
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.language=py,ts
sonar.sourceEncoding=UTF-8
sonar.verbose=false
