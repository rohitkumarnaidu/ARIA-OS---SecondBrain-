# =============================================================================
# Second Brain OS — Secret Scan (Gitleaks)
# Thorough secret scanning with SARIF upload + GitHub Issue creation
# =============================================================================

name: Secret Scan

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 0 * * 0'  # Sunday midnight
  workflow_dispatch:

jobs:
  scan:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Run Gitleaks (full history)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: true
          GITLEAKS_ENABLE_UPLOAD: true
        continue-on-error: true

      - name: Check for secrets found
        id: check
        run: |
          if [ -f gitleaks-report.json ]; then
            COUNT=$(jq '. | length' gitleaks-report.json 2>/dev/null || echo "0")
            echo "secrets_found=$COUNT" >> $GITHUB_OUTPUT
          else
            echo "secrets_found=0" >> $GITHUB_OUTPUT
          fi

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gitleaks-report.sarif
          category: gitleaks
        continue-on-error: true

      - name: Create GitHub Issue if secrets found
        if: steps.check.outputs.secrets_found != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const count = parseInt('${{ steps.check.outputs.secrets_found }}');
            if (count > 0) {
              const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `🔑 ${count} Secret(s) Detected — Rotate Immediately`,
                body: `## Secrets Detected\n\n**Count:** ${count}\n**Scan:** Gitleaks (full history)\n**Run:** ${runUrl}\n**Branch:** ${context.ref}\n\nPlease rotate any exposed credentials immediately.\n\nView the full report in the [Security tab](https://github.com/${context.repo.owner}/${context.repo.repo}/security/code-scanning).\n\n*This issue was automatically created by the Secret Scan workflow.*`,
                labels: ['security', 'automated', 'P0']
              });
            }
