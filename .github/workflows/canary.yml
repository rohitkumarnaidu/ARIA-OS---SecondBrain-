name: Canary Deployment

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to deploy as canary"
        required: true
        default: "main"
      rollout_percentage:
        description: "Initial rollout percentage (1-100)"
        required: true
        default: "5"
      flag_key:
        description: "Feature flag key"
        required: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_API: ${{ github.repository }}-api
  IMAGE_NAME_WEB: ${{ github.repository }}-web
  CANARY_TAG: canary-${{ github.sha }}

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API canary image
        uses: docker/build-push-action@v5
        with:
          context: apps/api
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_API }}:canary,${{ env.REGISTRY }}/${{ env.IMAGE_NAME_API }}:${{ env.CANARY_TAG }}

      - name: Build and push Web canary image
        uses: docker/build-push-action@v5
        with:
          context: apps/web
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_WEB }}:canary,${{ env.REGISTRY }}/${{ env.IMAGE_NAME_WEB }}:${{ env.CANARY_TAG }}

      - name: Output tag
        id: tag
        run: echo "tag=${{ env.CANARY_TAG }}" >> $GITHUB_OUTPUT

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Deploy canary services
        run: |
          docker compose -f docker-compose.yml -f infrastructure/canary/docker-compose.canary.yml up -d api-canary web-canary

      - name: Wait for health checks
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8001/health && break
            sleep 2
          done

      - name: Smoke tests
        run: |
          curl -sf http://localhost:8001/health/live || exit 1
          curl -sf http://localhost:8001/health/ready || exit 1
          curl -sf http://localhost:3001/ | grep -q "DOCTYPE" || exit 1

  promote:
    needs: deploy
    runs-on: ubuntu-latest
    environment:
      name: canary
    steps:
      - name: Enable feature flag via API
        run: |
          curl -X PUT "${{ secrets.API_BASE_URL }}/api/v1/feature-flags/${{ github.event.inputs.flag_key }}" \
            -H "Authorization: Bearer ${{ secrets.ADMIN_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"enabled": true, "rollout_percentage": ${{ github.event.inputs.rollout_percentage }}}'

      - name: Monitor (15-min observation window)
        run: |
          echo "Monitoring canary deployment for 15 minutes..."
          sleep 900
          echo "Monitoring complete. Manual promotion required for 100% rollout."

  rollback:
    if: failure()
    runs-on: ubuntu-latest
    needs:
      - deploy
      - promote
    if: always() && (needs.deploy.result == 'failure' || needs.promote.result == 'failure')
    steps:
      - name: Disable feature flag
        run: |
          curl -X PUT "${{ secrets.API_BASE_URL }}/api/v1/feature-flags/${{ github.event.inputs.flag_key }}" \
            -H "Authorization: Bearer ${{ secrets.ADMIN_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"enabled": false}'

      - name: Stop canary containers
        run: |
          docker compose -f docker-compose.yml -f infrastructure/canary/docker-compose.canary.yml down api-canary web-canary

      - name: Notify failure
        run: echo "Canary deployment failed. Flag disabled. Traffic reverted to stable."
