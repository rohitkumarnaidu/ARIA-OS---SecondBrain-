name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
        working-directory: apps/web
      - run: npm run lint
        working-directory: apps/web
      - run: npm run type-check
        working-directory: apps/web
      - run: npm run build
        working-directory: apps/web
      - name: Check design token drift
        run: node scripts/check-token-drift.mjs
        working-directory: apps/web
      - name: Build Storybook
        run: npm run build-storybook
        working-directory: apps/web
      - name: Bundle size audit
        run: bash ../../scripts/audit-bundle.sh
        working-directory: apps/web
      - run: npm run test:ci -- --coverage.thresholds.lines=70 --coverage.thresholds.branches=70 --coverage.thresholds.functions=70
        working-directory: apps/web
      - name: Upload frontend coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: apps/web/coverage/
          retention-days: 7
      - name: Install Playwright browsers
        if: github.event_name == 'pull_request'
        run: npx playwright install --with-deps chromium
        working-directory: apps/web
      - name: Run Playwright E2E tests
        if: github.event_name == 'pull_request'
        run: npx playwright test --reporter=html
        working-directory: apps/web
        continue-on-error: true
      - name: Run a11y checks
        if: github.event_name == 'pull_request'
        run: npx playwright test --config=playwright.config.ts --grep="@a11y"
        working-directory: apps/web
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

  backend:
    name: Backend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          cache: 'pip'
      - run: pip install -r apps/api/requirements.txt -r services/scheduler/requirements.txt ruff black pytest pytest-cov pytest-asyncio pytest-mock httpx
      - run: ruff check apps/api/ packages/ services/scheduler/ scripts/ tests/
      - run: black --check apps/api/ packages/ services/scheduler/ tests/ scripts/
      - run: python -m pytest tests/ --cov=packages --cov=apps/api --cov=services/scheduler --cov=scripts --cov-report=xml --cov-report=term --cov-report=html --cov-fail-under=85 -x
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 7

  pentest:
    name: Penetration Tests
    needs: [frontend, backend]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - run: pip install -r apps/api/requirements.txt
      - run: bash scripts/owasp-check.sh
      - run: bash scripts/sql-injection-audit.sh
      - run: python scripts/attack-scenarios.py
      - uses: actions/upload-artifact@v4
        if: always()
        continue-on-error: true
        with:
          name: pentest-reports
          path: |
            owasp-report*
            sql-audit-report*
            attack-scenarios-report*
            reports/
          retention-days: 30

  prompts:
    name: Prompts
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - run: pip install pyyaml pytest
      - run: python scripts/validate_prompts.py
      - run: python -m pytest tests/test_prompt_loader.py tests/test_agent_prompts.py tests/test_validate_script.py -v

  link-check:
    name: Link Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Check Markdown Links
        run: pwsh ./scripts/check-links.ps1
        shell: pwsh
      - name: Validate Doc IDs
        run: python scripts/validate-doc-ids.py

  docker:
    name: Docker
    needs: [frontend, backend, prompts]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-
      - run: docker compose build
        env:
          BUILDKIT_PROGRESS: plain
          DOCKER_BUILDKIT: 1
      - run: docker compose run --rm api python -c "import requests; r=requests.get('http://api:8000/health'); assert r.status_code == 200"

  lighthouse:
    name: Lighthouse CI
    needs: [frontend]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
        working-directory: apps/web
      - name: Build production bundle
        run: npm run build
        working-directory: apps/web
      - name: Run Lighthouse CI
        run: npx @lhci/cli@0.14.x autorun
        working-directory: apps/web
        env:
          LHCI_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  security:
    name: Security
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - run: npm audit --audit-level=high
        working-directory: apps/web
        continue-on-error: true
      - name: Install safety
        run: pip install safety
      - name: Safety check - API
        run: safety check -r apps/api/requirements.txt --full-report
        continue-on-error: true
      - name: Safety check - Scheduler
        run: safety check -r services/scheduler/requirements.txt --full-report
        continue-on-error: true
      - name: Install pip-audit
        run: pip install pip-audit
      - name: pip-audit - API
        run: pip-audit -r apps/api/requirements.txt
        continue-on-error: true
      - name: pip-audit - Scheduler
        run: pip-audit -r services/scheduler/requirements.txt
        continue-on-error: true
      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
      - uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
      - if: github.ref == 'refs/heads/main'
        uses: ossf/scorecard-action@v2
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

  load-test:
    name: Load Tests (k6)
    needs: [frontend, backend]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Install k6
        run: sudo apt-get update && sudo apt-get install -y k6
      - name: Run k6 auth tests
        run: k6 run tests/performance/load-test-auth.js --summary-export=k6-auth-summary.json -e API_URL=http://localhost:8000
        continue-on-error: true
      - name: Run k6 CRUD tests
        run: k6 run tests/performance/load-test-crud.js --summary-export=k6-crud-summary.json -e API_URL=http://localhost:8000
        continue-on-error: true
      - name: Run k6 AI tests
        run: k6 run tests/performance/load-test-ai.js --summary-export=k6-ai-summary.json -e API_URL=http://localhost:8000
        continue-on-error: true
      - name: Run k6 spike tests
        run: k6 run tests/performance/load-test-spike.js --summary-export=k6-spike-summary.json -e API_URL=http://localhost:8000
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: k6-reports
          path: k6-*-summary.json
          retention-days: 7

  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.0
      - run: terraform init
        working-directory: infrastructure/terraform
      - run: terraform validate
        working-directory: infrastructure/terraform
      - run: terraform plan -input=false
        working-directory: infrastructure/terraform
        continue-on-error: true
      - uses: aquasecurity/tfsec-action@v1
        continue-on-error: true
        with:
          working_directory: infrastructure/terraform
          format: sarif
