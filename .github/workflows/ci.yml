name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
        working-directory: apps/web
      - run: npm run lint
        working-directory: apps/web
      - run: npm run type-check
        working-directory: apps/web
      - run: npm run build
        working-directory: apps/web
      - run: npm run test:ci -- --coverage.thresholds.lines=100 --coverage.thresholds.branches=100 --coverage.thresholds.functions=100
        working-directory: apps/web
      - name: Upload frontend coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: apps/web/coverage/
          retention-days: 7
      - name: Install Playwright browsers
        if: github.event_name == 'pull_request'
        run: npx playwright install --with-deps chromium
        working-directory: apps/web
      - name: Run Playwright E2E tests
        if: github.event_name == 'pull_request'
        run: npx playwright test --reporter=html
        working-directory: apps/web
        continue-on-error: true
      - name: Run a11y checks
        if: github.event_name == 'pull_request'
        run: npx playwright test --config=playwright.config.ts --grep="@a11y"
        working-directory: apps/web
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

  backend:
    name: Backend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      - run: pip install -r apps/api/requirements.txt -r services/scheduler/requirements.txt ruff black pytest pytest-cov pytest-asyncio pytest-mock httpx
      - run: ruff check apps/api/ packages/ services/scheduler/ scripts/ tests/
      - run: black --check apps/api/ packages/ services/scheduler/ tests/ scripts/
      - run: python -m pytest tests/ --cov=packages --cov=apps/api --cov=services/scheduler --cov=scripts --cov-report=xml --cov-report=term --cov-report=html --cov-fail-under=100 -x
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 7

  prompts:
    name: Prompts
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install pyyaml pytest
      - run: python scripts/validate_prompts.py
      - run: python -m pytest tests/test_prompt_loader.py tests/test_agent_prompts.py -v

  docker:
    name: Docker
    needs: [frontend, backend, prompts]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-
      - run: docker compose build
        env:
          BUILDKIT_PROGRESS: plain
          DOCKER_BUILDKIT: 1
      - run: docker compose run --rm api python -c "import requests; r=requests.get('http://api:8000/health'); assert r.status_code == 200"

  lighthouse:
    name: Lighthouse CI
    needs: [frontend]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
        working-directory: apps/web
      - name: Build production bundle
        run: npm run build
        working-directory: apps/web
      - name: Run Lighthouse CI
        run: npx @lhci/cli@0.14.x autorun
        working-directory: apps/web
        env:
          LHCI_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  security:
    name: Security
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - run: npm audit --audit-level=high
        working-directory: apps/web
        continue-on-error: true
      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
      - uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
      - if: github.ref == 'refs/heads/main'
        uses: ossf/scorecard-action@v2
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true
