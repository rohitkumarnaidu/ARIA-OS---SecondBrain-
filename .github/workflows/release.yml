name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip
          cache-dependency-path: apps/api/requirements.txt

      - name: Install frontend dependencies
        run: npm ci
        working-directory: apps/web

      - name: Install backend dependencies
        run: pip install -r apps/api/requirements.txt
        working-directory: apps/api

      - name: ESLint
        run: npm run lint
        working-directory: apps/web

      - name: Ruff check
        run: ruff check apps/ packages/ services/ scripts/ tests/

      - name: Black check
        run: black --check apps/ packages/ services/ tests/ scripts/

      - name: Validate prompts
        run: python scripts/validate_prompts.py

  test:
    name: Test
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip
          cache-dependency-path: apps/api/requirements.txt

      - name: Install dependencies
        run: pip install -r apps/api/requirements.txt
        working-directory: apps/api

      - name: Backend tests with coverage
        run: pytest --cov=packages --cov=apps/api --cov-fail-under=80

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: apps/web

      - name: Frontend tests
        run: npm run test:ci
        working-directory: apps/web

  build:
    name: Build
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: apps/web

      - name: Type check
        run: npm run type-check
        working-directory: apps/web

      - name: Build
        run: npm run build
        working-directory: apps/web

      - name: Upload .next artifact
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: apps/web/.next/

  docker:
    name: Docker (${{ matrix.service }})
    needs: [build, test]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api, web, scheduler]
    steps:
      - uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.service }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=${{ matrix.service }}
            org.opencontainers.image.version=${{ github.ref_name }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Dockerfile path
        id: dockerfile
        run: echo "path=apps/${{ matrix.service }}/Dockerfile" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ steps.dockerfile.outputs.path }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Create Release
    needs: docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build changelog
        id: changelog
        uses: mikepenz/release-changelog-builder-action@v5
        with:
          configuration: '{"categories": [{"title": "## 🚀 Features", "labels": ["feature","enhancement"]},{"title": "## 🐛 Bug Fixes", "labels": ["bug","fix"]},{"title": "## 🧰 Maintenance", "labels": ["chore","dependencies","refactor"]}]}'

      - name: Determine draft mode
        id: draft
        run: |
          if echo "${{ github.ref_name }}" | grep -qE '\-(rc|beta|alpha)'; then
            echo "draft=true" >> $GITHUB_OUTPUT
          else
            echo "draft=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.changelog }}
          draft: ${{ steps.draft.outputs.draft }}
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          generate_release_notes: false
