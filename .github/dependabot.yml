version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/apps/web"
    schedule:
      interval: "weekly"
      day: "monday"
    versioning-strategy: increase
    open-pull-requests-limit: 10
    labels: ["dependencies", "frontend"]
    groups:
      react:
        patterns: ["react", "react-dom", "@types/react", "@types/react-dom"]
      next:
        patterns: ["next*", "eslint-config-next"]
      supabase:
        patterns: ["@supabase/*"]
      testing:
        patterns: ["vitest", "@testing-library/*", "jsdom"]

  - package-ecosystem: "pip"
    directory: "/apps/api"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels: ["dependencies", "backend"]
    groups:
      fastapi:
        patterns: ["fastapi", "uvicorn", "pydantic"]
      ai:
        patterns: ["anthropic", "httpx"]

  - package-ecosystem: "pip"
    directory: "/services/scheduler"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "python"

  - package-ecosystem: "docker"
    directory: "/apps/api"
    schedule:
      interval: "monthly"
    labels: ["dependencies", "docker"]

  - package-ecosystem: "docker"
    directory: "/apps/web"
    schedule:
      interval: "monthly"
    labels: ["dependencies", "docker"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels: ["dependencies", "ci"]
