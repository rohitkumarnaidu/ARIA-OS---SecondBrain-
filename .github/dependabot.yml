# =============================================================================
# Second Brain OS — Dependabot Configuration
# Automated dependency updates for all package ecosystems
# =============================================================================

version: 2
updates:
  # ── Frontend (npm) ─────────────────────────────────────────────────────────
  - package-ecosystem: npm
    directory: /apps/web
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Kolkata
    versioning-strategy: increase
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - frontend
      - automated
    reviewers:
      - developer
    assignees:
      - developer
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
    groups:
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      nextjs:
        patterns:
          - "next"
          - "eslint-config-next"
      supabase:
        patterns:
          - "@supabase/*"
      testing:
        patterns:
          - "vitest"
          - "@playwright/*"
          - "@testing-library/*"
    ignore:
      - dependency-name: "next"
        versions: [">=15.0.0-alpha"]
      - dependency-name: "typescript"
        versions: [">=6.0.0"]

  # ── Backend API (pip) ──────────────────────────────────────────────────────
  - package-ecosystem: pip
    directory: /apps/api
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Kolkata
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - backend
      - automated
    reviewers:
      - developer
    assignees:
      - developer
    commit-message:
      prefix: "chore(deps)"
    groups:
      fastapi:
        patterns:
          - "fastapi*"
          - "uvicorn*"
          - "pydantic*"
      supabase-py:
        patterns:
          - "supabase*"
          - "gotrue*"
          - "realtime*"

  # ── Scheduler (pip) ────────────────────────────────────────────────────────
  - package-ecosystem: pip
    directory: /services/scheduler
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Kolkata
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - scheduler
      - automated
    reviewers:
      - developer
    assignees:
      - developer
    commit-message:
      prefix: "chore(deps)"

  # ── Docker ─────────────────────────────────────────────────────────────────
  - package-ecosystem: docker
    directory: /apps/api
    schedule:
      interval: monthly
    labels:
      - dependencies
      - docker
    commit-message:
      prefix: "chore(docker)"

  - package-ecosystem: docker
    directory: /apps/web
    schedule:
      interval: monthly
    labels:
      - dependencies
      - docker
    commit-message:
      prefix: "chore(docker)"

  - package-ecosystem: docker
    directory: /services/scheduler
    schedule:
      interval: monthly
    labels:
      - dependencies
      - docker
    commit-message:
      prefix: "chore(docker)"

  # ── GitHub Actions ─────────────────────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: "chore(ci)"
