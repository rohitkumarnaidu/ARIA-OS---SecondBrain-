[pytest]
testpaths = tests
python_files = test_*.py
python_functions = test_*
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
markers =
    prompt: Tests related to prompt loading and validation
    agent: Tests related to agent modules
    api: Tests for API endpoint behavior
    integration: Tests that interact with external services
    schema: Tests for Pydantic database schemas
    scheduler: Tests for cron job scheduling
    slow: Tests that take longer than 5 seconds
    security: Tests for security and auth
addopts =
    --tb=short
    --strict-markers
    --cov=packages
    --cov=apps/api
    --cov=services/scheduler
    --cov-report=term-missing
    --cov-report=html
    --cov-fail-under=69.9
