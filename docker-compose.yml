# =============================================================================
# Second Brain OS — Docker Compose
# Personal AI productivity system
# =============================================================================
# Usage:
#   docker compose up -d                    # Start all services (development)
#   docker compose up -d frontend backend   # Start specific services
#   docker compose logs -f                  # Follow logs
#   docker compose down                     # Stop all services
#   docker compose --profile production up  # Start production builds
# =============================================================================


# ── Networks ─────────────────────────────────────────────────────────────────
networks:
  app-net:
    driver: bridge

# ── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  # Ollama model storage (persists downloaded models across restarts)
  ollama-models:
  # Node modules cache (avoids re-installing on every container restart)
  node_modules:

# ── Services ─────────────────────────────────────────────────────────────────
services:
  # ── Frontend ───────────────────────────────────────────────────────────────
  # Next.js 14 application with hot-reload for development.
  frontend:
    container_name: app-frontend
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: ${DOCKER_TARGET:-development}
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - WATCHPACK_POLLING=true
    volumes:
      - ./apps/web:/app
      - node_modules:/app/node_modules
      - ./packages:/app/packages
    networks:
      - app-net
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000',r=>{process.exit(r.statusCode===200?0:1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      org.opencontainers.image.title: "Second Brain OS Frontend"
      org.opencontainers.image.description: "Next.js 14 frontend — development build"
      org.opencontainers.image.vendor: "Second Brain OS"
      com.secondbrain.service: "frontend"

  # ── Backend ────────────────────────────────────────────────────────────────
  # FastAPI application with auto-reload for development.
  backend:
    container_name: app-backend
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: ${DOCKER_TARGET:-development}
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DEBUG=${DEBUG:-True}
      - USE_LOCAL_AI=${USE_LOCAL_AI:-True}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-10080}
      - CLAUDE_API_KEY=${CLAUDE_API_KEY}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost:3001}
    volumes:
      - ./apps/api:/app
      - ./packages:/app/packages
    networks:
      - app-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; r=urllib.request.urlopen('http://localhost:8000/health'); assert r.status == 200"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      org.opencontainers.image.title: "Second Brain OS API"
      org.opencontainers.image.description: "FastAPI backend — development build"
      org.opencontainers.image.vendor: "Second Brain OS"
      com.secondbrain.service: "backend"

  # ── Scheduler ──────────────────────────────────────────────────────────────
  # APScheduler that runs cron jobs (daily briefing, habit checks, etc.).
  scheduler:
    container_name: app-scheduler
    build:
      context: .
      dockerfile: services/scheduler/Dockerfile
      target: ${DOCKER_TARGET:-development}
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      - DEBUG=${DEBUG:-True}
      - USE_LOCAL_AI=${USE_LOCAL_AI:-True}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-10080}
      - CLAUDE_API_KEY=${CLAUDE_API_KEY}
      - RESEND_API_KEY=${RESEND_API_KEY}
    volumes:
      - ./services/scheduler:/app
      - ./packages:/app/packages
    networks:
      - app-net
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; r=urllib.request.urlopen('http://localhost:8001/health'); assert r.status == 200"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    labels:
      org.opencontainers.image.title: "Second Brain OS Scheduler"
      org.opencontainers.image.description: "APScheduler cron jobs — development build"
      org.opencontainers.image.vendor: "Second Brain OS"
      com.secondbrain.service: "scheduler"

  # ── MCP Server ─────────────────────────────────────────────────────────────
  # Model Context Protocol server — tool-calling proxy for AI agents.
  mcp:
    container_name: app-mcp
    build:
      context: .
      dockerfile: services/mcp/Dockerfile
      target: ${DOCKER_TARGET:-development}
    ports:
      - "8765:8765"
    env_file:
      - .env
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - LOG_LEVEL=${LOG_LEVEL:-DEBUG}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - CLAUDE_API_KEY=${CLAUDE_API_KEY:-}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
    volumes:
      - ./services/mcp:/app
      - ./packages:/app/packages
      - ./prompts:/app/prompts
    networks:
      - app-net
    depends_on:
      - backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    labels:
      org.opencontainers.image.title: "Second Brain OS MCP"
      org.opencontainers.image.description: "MCP tool-calling proxy — development build"
      org.opencontainers.image.vendor: "Second Brain OS"
      com.secondbrain.service: "mcp"

  # ── Ollama (Optional) ──────────────────────────────────────────────────────
