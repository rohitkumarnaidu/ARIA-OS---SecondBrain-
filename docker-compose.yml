# =============================================================================
# Second Brain OS — Docker Compose
# Personal AI productivity system
# =============================================================================
# Usage:
#   docker compose up -d                    # Start all services
#   docker compose up -d frontend backend   # Start specific services
#   docker compose logs -f                  # Follow logs
#   docker compose down                     # Stop all services
# =============================================================================

version: "3.9"

# ── Networks ─────────────────────────────────────────────────────────────────
networks:
  secondbrain-net:
    driver: bridge

# ── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  # Ollama model storage (persists downloaded models across restarts)
  ollama-models:
  # Node modules cache (avoids re-installing on every container restart)
  node_modules:

# ── Services ─────────────────────────────────────────────────────────────────
services:
  # ── Frontend ───────────────────────────────────────────────────────────────
  # Next.js 14 application with hot-reload for development.
  # Builds from apps/web/ and exposes port 3000.
  frontend:
    container_name: secondbrain-frontend
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      target: development
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - WATCHPACK_POLLING=true  # Enables hot-reload on Docker volumes
    volumes:
      # Mount source code for hot-reload; exclude node_modules via Dockerfile
      - ./apps/web:/app
      # Persist node_modules in a named volume so the container installs deps
      - node_modules:/app/node_modules
    networks:
      - secondbrain-net
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped

  # ── Backend ────────────────────────────────────────────────────────────────
  # FastAPI application with auto-reload for development.
  # Builds from apps/api/ and exposes port 8000.
  backend:
    container_name: secondbrain-backend
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: development
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DEBUG=True
      - USE_LOCAL_AI=${USE_LOCAL_AI:-True}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-10080}
      - CLAUDE_API_KEY=${CLAUDE_API_KEY}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost:3001}
    volumes:
      # Mount source code for auto-reload; the container's WORKDIR should be /app
      - ./apps/api:/app
    networks:
      - secondbrain-net
    restart: unless-stopped

  # ── Scheduler ──────────────────────────────────────────────────────────────
  # APScheduler that runs cron jobs (daily briefing, habit checks, etc.).
  # No ports exposed; runs headlessly alongside the backend.
  scheduler:
    container_name: secondbrain-scheduler
    build:
      context: ./services/scheduler
      dockerfile: Dockerfile
      target: development
    env_file:
      - .env
    environment:
      - DEBUG=True
      - USE_LOCAL_AI=${USE_LOCAL_AI:-True}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-10080}
      - CLAUDE_API_KEY=${CLAUDE_API_KEY}
      - RESEND_API_KEY=${RESEND_API_KEY}
    volumes:
      - ./services/scheduler:/app
    networks:
      - secondbrain-net
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped

  # ── Ollama (Optional) ──────────────────────────────────────────────────────
  # Local AI inference server. Uncomment to run Mistral 7B locally.
  # Pulls the model on first startup; subsequent starts reuse the cached model.
  # Once running, set OLLAMA_BASE_URL=http://ollama:11434 in the .env file.
  # ⚠ Requires ~5 GB free RAM and ~4 GB disk for the Mistral 7B model.
  # ollama:
  #   container_name: secondbrain-ollama
  #   image: ollama/ollama:latest
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama-models:/root/.ollama
  #   networks:
  #     - secondbrain-net
  #   command: serve
  #   # Uncomment below to auto-pull Mistral on restart (slows startup):
  #   # entrypoint: >
  #   #   sh -c "ollama serve & sleep 3 && ollama pull mistral && wait"
  #   restart: unless-stopped
