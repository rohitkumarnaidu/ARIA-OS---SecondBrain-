# HTTP -> HTTPS redirect
server {
    listen 80;
    server_name app.app.com;
    return 301 https://$host$request_uri;
}

# HTTPS server block
server {
    listen 443 ssl http2;
    server_name app.app.com;

    root /usr/share/nginx/html;
    index index.html;

    # Rate limiting
    limit_req zone=web burst=50 nodelay;

    # Gzip for text content
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Security: deny hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Static assets: Next.js build output — 1 year, immutable
    location /_next/static/ {
        expires 1y;
        add_header Cache-Control "public, immutable, must-revalidate";
        add_header X-Cache-Status HIT;
        access_log off;
    }

    # Static CSS/JS — 1 year, immutable
    location ~* \.(css|js)$ {
        expires 1y;
        add_header Cache-Control "public, immutable, must-revalidate";
        access_log off;
    }

    # Images, fonts, icons — 7 days
    location ~* \.(png|jpg|jpeg|gif|webp|avif|svg|ico|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public, must-revalidate";
        access_log off;
    }

    # Service worker — never cache
    location = /sw.js {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        access_log off;
    }

    # Index HTML — revalidate always
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # SPA fallback routing
    location / {
        try_files $uri $uri/ /index.html;

        # Don't cache HTML
        expires -1;
        add_header Cache-Control "no-cache, must-revalidate";
    }
}
