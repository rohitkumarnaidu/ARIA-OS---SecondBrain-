apiVersion: apps/v1
kind: Deployment
metadata:
  name: aria-web
  namespace: aria-os
  labels:
    app: aria-web
    tier: frontend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: aria-web
  template:
    metadata:
      labels:
        app: aria-web
    spec:
      containers:
        - name: web
          image: ghcr.io/aria-os/web:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: aria-config
            - secretRef:
                name: aria-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
