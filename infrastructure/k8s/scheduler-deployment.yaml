apiVersion: apps/v1
kind: Deployment
metadata:
  name: sb-scheduler
  namespace: secondbrain-os
  labels:
    app: sb-scheduler
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aria-scheduler
  template:
    metadata:
      labels:
        app: sb-scheduler
    spec:
      containers:
        - name: scheduler
          image: ghcr.io/secondbrain-os/scheduler:latest
          envFrom:
            - configMapRef:
                name: sb-config
            - secretRef:
                name: sb-secrets
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
