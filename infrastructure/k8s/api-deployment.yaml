apiVersion: apps/v1
kind: Deployment
metadata:
  name: sb-api
  namespace: secondbrain-os
  labels:
    app: sb-api
    tier: backend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: sb-api
  template:
    metadata:
      labels:
        app: sb-api
    spec:
      containers:
        - name: api
          image: ghcr.io/secondbrain-os/api:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: sb-config
            - secretRef:
                name: sb-secrets
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
