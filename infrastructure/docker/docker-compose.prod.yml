version: "3.8"

services:
  api:
    image: ghcr.io/secondbrain/api:latest
    restart: always
    deploy:
      replicas: 2
    environment:
      - ENVIRONMENT=production
      - LOG_LEVEL=WARN

  web:
    image: ghcr.io/secondbrain/web:latest
    restart: always
    deploy:
      replicas: 2

  scheduler:
    image: ghcr.io/secondbrain/scheduler:latest
    restart: always
