replicaCount: 2

image:
  repository: ghcr.io/app/web
  tag: latest
  pullPolicy: Always

service:
  port: 3000
  targetPort: 3000

resources:
  requests:
    memory: "256Mi"
    cpu: "250m"
  limits:
    memory: "512Mi"
    cpu: "500m"

env:
  NEXT_PUBLIC_SUPABASE_URL: ""
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ""
  NEXT_PUBLIC_API_URL: "https://api.app.com"

ingress:
  enabled: true
  host: app.app.com
  tls: true
