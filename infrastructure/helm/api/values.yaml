replicaCount: 2

image:
  repository: ghcr.io/app/api
  tag: latest
  pullPolicy: Always

service:
  port: 8000
  targetPort: 8000

resources:
  requests:
    memory: "256Mi"
    cpu: "250m"
  limits:
    memory: "512Mi"
    cpu: "500m"

env:
  SUPABASE_URL: ""
  SUPABASE_KEY: ""
  SUPABASE_SERVICE_KEY: ""
  JWT_SECRET: ""
  USE_LOCAL_AI: "true"
  OLLAMA_BASE_URL: "http://ollama:11434"
  CORS_ORIGINS: "https://app.app.com"

healthCheck:
  path: /health
  initialDelaySeconds: 10
  periodSeconds: 30

ingress:
  enabled: true
  host: api.app.com
  tls: true
